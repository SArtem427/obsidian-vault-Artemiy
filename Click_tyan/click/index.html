<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клик-тян</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="content">
    <div class="popup-bubble" id="girls-words" hidden>
      <span>Ты куда? 😥</span>
      <span>Ты так хорошо начал...</span>
    </div>
    <h1>Клик-тян</h1>
    <p class="subtitle">Кликай по персонажу — каждые 10 000 касаний снимается один элемент</p>
    <div class="counter-wrap">
      <span class="total">Всего кликов:</span>
      <span class="clicks" id="clicks">0</span>
      <span class="progress-text" id="progressText">0 / 10 000 до следующего предмета</span>
    </div>
    <div class="character-wrap" id="characterWrap">
      <div class="character" id="character">
        <img src="assets/images/IMG_1395.PNG" alt="Клик-тян" id="characterImg">
      </div>
    </div>
    <p class="hint" id="hint">Следующий: первый образ (форма)</p>
  </div>

  <div class="cheat-warning" id="cheatWarning">
    <div class="cheat-warning__box">
      <div class="cheat-warning__title">Слышь! А ну ка не читерим</div>
    </div>
  </div>

  <svg width="0" height="0" aria-hidden="true">
    <defs>
      <clipPath id="characterClip" clipPathUnits="objectBoundingBox">
        <path id="clipPath" d="M 0 0 L 1 0 L 1 1 L 0 1 Z" fill-rule="evenodd"/>
      </clipPath>
    </defs>
  </svg>

  

  <script type="module" src="src/main.js"></script>
</body>
</html>
