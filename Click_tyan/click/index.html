<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клик-тян</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #0a0612;
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
      position: relative;
      overflow-x: hidden;
    }
    /* Звёзды на фоне */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    .star:nth-child(3n) { animation-delay: 0.3s; }
    .star:nth-child(5n) { animation-delay: 0.8s; }
    .star:nth-child(7n) { animation-delay: 1.2s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff9ecd, #ffd6e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #c9b3e8;
      margin-bottom: 24px;
    }
    .counter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.08);
      padding: 12px 24px;
      border-radius: 16px;
    }
    .counter-wrap .total {
      font-size: 1rem;
      color: #a78bd4;
    }
    .counter-wrap .clicks {
      font-size: 1.5rem;
      font-weight: 900;
      color: #ff9ecd;
    }
    .progress-text {
      font-size: 0.85rem;
      color: #8b7aa8;
      margin-top: 4px;
    }
    .character-wrap {
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
    }
    .character-wrap:hover {
      transform: scale(1.02);
    }
    .character-wrap:active .character {
      transform: scale(0.98);
    }
    .character {
      width: 280px;
      max-width: 90vw;
      position: relative;
      transition: transform 0.1s ease;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .character img {
      width: 100%;
      height: auto;
      display: block;
    }
    .hint {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #a78bd4;
      text-align: center;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="content">
    <h1>Клик-тян</h1>
    <p class="subtitle">Кликай по персонажу — каждые 10 000 касаний снимается один элемент</p>
    <div class="counter-wrap">
      <span class="total">Всего кликов:</span>
      <span class="clicks" id="clicks">0</span>
      <span class="progress-text" id="progressText">0 / 10 000 до следующего предмета</span>
    </div>
    <div class="character-wrap" id="characterWrap">
      <div class="character" id="character">
        <img src="IMG_1395.PNG" alt="Клик-тян" id="characterImg">
      </div>
    </div>
    <p class="hint" id="hint">Следующий: первый образ (форма)</p>
  </div>

  <svg width="0" height="0" aria-hidden="true">
    <defs>
      <clipPath id="characterClip" clipPathUnits="objectBoundingBox">
        <path id="clipPath" d="M 0 0 L 1 0 L 1 1 L 0 1 Z" fill-rule="evenodd"/>
      </clipPath>
    </defs>
  </svg>

  <script>
    const CLICKS_PER_ITEM = 10000;
    const IMG_FIRST = 'IMG_1395.PNG';
    const IMG_SECOND = 'IMG_1397.JPG';

    const items = [
      { name: 'первый образ (форма)', path: null },
      { name: 'розовый бант в волосах', path: 'M 0.14 0.08 L 0.24 0.08 L 0.24 0.16 L 0.14 0.16 Z' },
      { name: 'белый бантик на груди', path: 'M 0.44 0.28 L 0.56 0.28 L 0.56 0.34 L 0.44 0.34 Z' },
      { name: 'левый бретель', path: 'M 0.22 0.30 L 0.32 0.30 L 0.32 0.48 L 0.22 0.48 Z' },
      { name: 'правый бретель', path: 'M 0.68 0.30 L 0.78 0.30 L 0.78 0.48 L 0.68 0.48 Z' },
      { name: 'топ (майка)', path: 'M 0.30 0.34 L 0.70 0.34 L 0.70 0.58 L 0.30 0.58 Z' },
      { name: 'трусики', path: 'M 0.34 0.56 L 0.66 0.56 L 0.66 0.82 L 0.34 0.82 Z' }
    ];

    let totalClicks = 0;
    let removedCount = 0;
    const clicksEl = document.getElementById('clicks');
    const progressTextEl = document.getElementById('progressText');
    const hintEl = document.getElementById('hint');
    const characterWrap = document.getElementById('characterWrap');
    const characterEl = document.getElementById('character');
    const clipPathEl = document.getElementById('clipPath');

    function formatNum(n) {
      return n.toLocaleString('ru-RU');
    }

    function buildClipPath(removed) {
      let d = 'M 0 0 L 1 0 L 1 1 L 0 1 Z';
      if (removed <= 0) return d;
      for (let i = 1; i < removed; i++) {
        if (items[i].path) d += ' ' + items[i].path;
      }
      return d;
    }

    function updateImage() {
      const img = document.getElementById('characterImg');
      img.src = removedCount >= 1 ? IMG_SECOND : IMG_FIRST;
    }

    function updateUI() {
      clicksEl.textContent = formatNum(totalClicks);

      if (removedCount >= items.length) {
        progressTextEl.textContent = 'Все элементы сняты!';
        hintEl.textContent = 'Всё снято!';
        return;
      }

      const nextThreshold = (removedCount + 1) * CLICKS_PER_ITEM;
      const progress = totalClicks - removedCount * CLICKS_PER_ITEM;
      progressTextEl.textContent = `${formatNum(progress)} / ${formatNum(CLICKS_PER_ITEM)} до следующего предмета`;
      hintEl.textContent = `Следующий: ${items[removedCount].name}`;
    }

    function applyClip() {
      clipPathEl.setAttribute('d', buildClipPath(removedCount));
      characterEl.style.clipPath = 'url(#characterClip)';
      updateImage();
    }

    // Звёзды на фоне
    (function initStars() {
      const container = document.getElementById('stars');
      const count = 120;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2 + 0.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(star);
      }
    })();

    characterWrap.addEventListener('click', function() {
      totalClicks++;

      while (removedCount < items.length && totalClicks >= (removedCount + 1) * CLICKS_PER_ITEM) {
        removedCount++;
        applyClip();
      }

      updateUI();
    });

    updateUI();
    applyClip();
  </script>
</body>
</html>
